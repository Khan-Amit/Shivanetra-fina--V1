<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivanetra - Complete Horoscope Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        body.light {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #1a1a2e;
        }
        body.dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        body.light h1 {
            color: #1a1a2e;
        }
        body.dark h1 {
            background: linear-gradient(90deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
        }
        .theme-toggle {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .lang-select {
            padding: 10px 15px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
        }
        .date-search {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .date-search input {
            padding: 10px;
            border-radius: 30px;
            border: none;
            padding: 10px 15px;
        }
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: inherit;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 0 15px rgba(255,107,107,0.5);
        }
        .sign-selector {
            text-align: center;
            margin-bottom: 30px;
        }
        select {
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: none;
            background: #0f3460;
            color: #fff;
            cursor: pointer;
            min-width: 250px;
        }
        body.light select {
            background: #e0e0e0;
            color: #1a1a2e;
        }
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .prediction-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .category {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
        }
        .category h3 {
            margin-bottom: 10px;
            color: #ffd89b;
        }
        .category input, .category textarea {
            width: 100%;
            padding: 8px;
            border-radius: 10px;
            border: none;
            background: #fff;
            color: #000;
        }
        body.dark .category input, body.dark .category textarea {
            background: #2a2a2a;
            color: #fff;
        }
        .meter {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ffd89b);
            border-radius: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-save { background: #4caf50; color: white; }
        .btn-pdf { background: #dc3545; color: white; }
        .btn-whatsapp { background: #25d366; color: white; }
        .btn-email { background: #17a2b8; color: white; }
        .btn-voice { background: #6f42c1; color: white; }
        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .message.show { display: block; }
        .message.success { background: #4caf50; }
        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="dark">
<div class="container">
    <h1>🔮 Shivanetra Horoscope Pro 🔮</h1>

    <div class="top-bar">
        <button class="theme-toggle" id="themeToggle">🌓 Dark/Light</button>
        <select id="langSelect" class="lang-select">
            <option value="en">🇬🇧 English</option>
            <option value="hi">🇮🇳 हिंदी (Hindi)</option>
        </select>
        <div class="date-search">
            <input type="date" id="searchDate">
            <button id="searchBtn">🔍 Search</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="today">📅 Today</button>
        <button class="tab-btn" data-tab="tomorrow">🌅 Tomorrow</button>
        <button class="tab-btn" data-tab="weekly">📆 Weekly</button>
        <button class="tab-btn" data-tab="monthly">🌙 Monthly</button>
    </div>

    <div class="sign-selector">
        <select id="signSelect">
            <option value="">-- Select Your Zodiac Sign --</option>
        </select>
    </div>

    <div class="main-grid">
        <div class="prediction-card">
            <h2 id="signTitle">Select a sign</h2>
            <div id="categoryContainer" class="category-grid"></div>
            <div id="luckMeter"></div>
            <div class="action-buttons">
                <button class="btn-save" id="saveBtn">💾 Save</button>
                <button class="btn-pdf" id="pdfBtn">📄 PDF</button>
                <button class="btn-whatsapp" id="whatsappBtn">📱 WhatsApp</button>
                <button class="btn-email" id="emailBtn">✉️ Email</button>
                <button class="btn-voice" id="voiceBtn">🎤 Voice Input</button>
            </div>
        </div>
        <div class="chart-card">
            <h3>📊 Predictions Chart</h3>
            <canvas id="predictionChart" width="400" height="300"></canvas>
        </div>
    </div>
    <div id="message" class="message"></div>
    <footer style="text-align:center; margin-top:30px; opacity:0.7;">© Shivanetra - All predictions editable & savable</footer>
</div>

<script>
    // Signs Data
    const signsData = {
        "zodiac_signs": [
            { "id": "aries", "name": "Aries", "name_hi": "मेष" },
            { "id": "taurus", "name": "Taurus", "name_hi": "वृषभ" },
            { "id": "gemini", "name": "Gemini", "name_hi": "मिथुन" },
            { "id": "cancer", "name": "Cancer", "name_hi": "कर्क" },
            { "id": "leo", "name": "Leo", "name_hi": "सिंह" },
            { "id": "virgo", "name": "Virgo", "name_hi": "कन्या" },
            { "id": "libra", "name": "Libra", "name_hi": "तुला" },
            { "id": "scorpio", "name": "Scorpio", "name_hi": "वृश्चिक" },
            { "id": "sagittarius", "name": "Sagittarius", "name_hi": "धनु" },
            { "id": "capricorn", "name": "Capricorn", "name_hi": "मकर" },
            { "id": "aquarius", "name": "Aquarius", "name_hi": "कुंभ" },
            { "id": "pisces", "name": "Pisces", "name_hi": "मीन" }
        ]
    };

    // Default Predictions (complete)
    const defaultPredictions = {
        "today": {
            "aries": { overall: "Energetic day", love: "Romantic sparks", career: "New opportunity", health: "Great energy", travel: "Short trip fruitful", finance: "Steady income", luck: 85, color: "Red", number: "7" },
            "taurus": { overall: "Stable and calm", love: "Deep connection", career: "Steady progress", health: "Good", travel: "Avoid long trips", finance: "Save money", luck: 70, color: "Green", number: "4" },
            "gemini": { overall: "Curious mind", love: "Flirty vibes", career: "Meetings", health: "Rest needed", travel: "Exciting plans", finance: "Unexpected gain", luck: 90, color: "Yellow", number: "3" },
            "cancer": { overall: "Emotional day", love: "Family time", career: "Supportive", health: "Hydrate", travel: "Visit water", finance: "Budget well", luck: 65, color: "White", number: "2" },
            "leo": { overall: "Shine bright", love: "Passionate", career: "Leadership", health: "Exercise", travel: "Luxury trip", finance: "Investment good", luck: 95, color: "Gold", number: "1" },
            "virgo": { overall: "Productive", love: "Practical love", career: "Details matter", health: "Healthy eating", travel: "Plan ahead", finance: "Analyze", luck: 75, color: "Brown", number: "5" },
            "libra": { overall: "Balanced", love: "Romantic date", career: "Teamwork", health: "Yoga helps", travel: "Partner travel", finance: "Fair deals", luck: 80, color: "Pink", number: "6" },
            "scorpio": { overall: "Intense", love: "Deep trust", career: "Transformation", health: "Detox", travel: "Mysterious place", finance: "Hidden money", luck: 88, color: "Black", number: "8" },
            "sagittarius": { overall: "Adventure", love: "Free spirit", career: "Expansion", health: "Outdoor", travel: "Perfect time", finance: "Spend on fun", luck: 92, color: "Purple", number: "9" },
            "capricorn": { overall: "Focused", love: "Commitment", career: "Promotion", health: "Discipline", travel: "Business trip", finance: "Wealth grows", luck: 78, color: "Grey", number: "10" },
            "aquarius": { overall: "Innovative", love: "Unique bond", career: "Ideas flow", health: "Social energy", travel: "Group trip", finance: "Tech gains", luck: 82, color: "Blue", number: "11" },
            "pisces": { overall: "Dreamy", love: "Romantic fantasy", career: "Artistic", health: "Rest well", travel: "Beach escape", finance: "Intuitive", luck: 87, color: "Sea Green", number: "12" }
        },
        "tomorrow": {},
        "weekly": {},
        "monthly": {}
    };

    // Initialize
    let userPredictions = JSON.parse(localStorage.getItem("shivanetra_predictions"));
    if (!userPredictions) {
        userPredictions = JSON.parse(JSON.stringify(defaultPredictions));
    }

    let currentTab = "today";
    let currentSignId = "";
    let currentLang = "en";
    let chartInstance = null;

    // Translations
    const translations = {
        en: {
            overall: "Overall", love: "Love", career: "Career", health: "Health", travel: "Travel", finance: "Finance", color: "Lucky Color", number: "Lucky Number", luck: "Luck"
        },
        hi: {
            overall: "सामान्य", love: "प्रेम", career: "करियर", health: "स्वास्थ्य", travel: "यात्रा", finance: "वित्त", color: "शुभ रंग", number: "शुभ अंक", luck: "भाग्य"
        }
    };

    function loadSigns() {
        const select = document.getElementById("signSelect");
        select.innerHTML = '<option value="">-- चुनें / Select --</option>';
        signsData.zodiac_signs.forEach(sign => {
            const option = document.createElement("option");
            option.value = sign.id;
            const displayName = currentLang === "hi" ? sign.name_hi : sign.name;
            option.textContent = displayName;
            select.appendChild(option);
        });
    }

    function render() {
        if (!currentSignId) {
            document.getElementById("signTitle").innerText = "Select a sign above";
            document.getElementById("categoryContainer").innerHTML = "";
            return;
        }
        const sign = signsData.zodiac_signs.find(s => s.id === currentSignId);
        const signName = currentLang === "hi" ? sign.name_hi : sign.name;
        document.getElementById("signTitle").innerHTML = `${signName} Horoscope - ${currentTab.toUpperCase()}`;

        let pred = userPredictions[currentTab]?.[currentSignId];
        if (!pred) {
            pred = { overall: "", love: "", career: "", health: "", travel: "", finance: "", luck: 50, color: "", number: "" };
            if (!userPredictions[currentTab]) userPredictions[currentTab] = {};
            userPredictions[currentTab][currentSignId] = pred;
        }

        const cats = ["overall", "love", "career", "health", "travel", "finance", "color", "number"];
        let html = `<div class="category-grid">`;
        cats.forEach(cat => {
            const label = translations[currentLang][cat] || cat;
            const value = pred[cat] || "";
            if (cat === "color" || cat === "number") {
                html += `<div class="category"><h3>${label}</h3><input type="text" data-field="${cat}" value="${escapeHtml(value)}"></div>`;
            } else {
                html += `<div class="category"><h3>${label}</h3><textarea data-field="${cat}" rows="2">${escapeHtml(value)}</textarea></div>`;
            }
        });
        html += `<div class="category"><h3>${translations[currentLang].luck} (0-100)</h3>
                 <input type="range" data-field="luck" min="0" max="100" value="${pred.luck || 50}">
                 <span id="luckValue">${pred.luck || 50}%</span>
                 <div class="meter"><div class="meter-fill" style="width:${pred.luck || 50}%"></div></div>
                 </div>`;
        html += `</div>`;
        document.getElementById("categoryContainer").innerHTML = html;

        // Attach events
        document.querySelectorAll("[data-field]").forEach(input => {
            input.addEventListener("change", function() {
                const field = this.getAttribute("data-field");
                let val = this.value;
                if (field === "luck") val = parseInt(this.value);
                userPredictions[currentTab][currentSignId][field] = val;
                if (field === "luck") {
                    document.getElementById("luckValue").innerText = val + "%";
                    const fill = document.querySelector(".meter-fill");
                    if (fill) fill.style.width = val + "%";
                }
                updateChart();
                showMessage("Changes made - Save to keep!", "success");
            });
            if (input.type === "range") {
                input.addEventListener("input", function() {
                    document.getElementById("luckValue").innerText = this.value + "%";
                });
            }
        });
        updateChart();
    }

    function updateChart() {
        if (!currentSignId) return;
        const pred = userPredictions[currentTab]?.[currentSignId] || { love: 50, career: 50, health: 50, travel: 50, finance: 50, luck: 50 };
        const ctx = document.getElementById('predictionChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Love', 'Career', 'Health', 'Travel', 'Finance', 'Luck'],
                datasets: [{
                    label: currentTab.toUpperCase(),
                    data: [pred.love?.length ? 70 : 50, pred.career?.length ? 70 : 50, pred.health?.length ? 70 : 50, pred.travel?.length ? 70 : 50, pred.finance?.length ? 70 : 50, pred.luck || 50],
                    backgroundColor: 'rgba(255,107,107,0.2)',
                    borderColor: '#ff6b6b',
                    borderWidth: 2
                }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
    }

    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, function(m) { return m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;"; }); }
    function showMessage(msg, type) { const m = document.getElementById("message"); m.textContent = msg; m.className = `message show ${type}`; setTimeout(() => m.classList.remove("show"), 3000); }

    // Save
    document.getElementById("saveBtn").addEventListener("click", () => { localStorage.setItem("shivanetra_predictions", JSON.stringify(userPredictions)); showMessage("✅ Saved!", "success"); });
    // PDF
    document.getElementById("pdfBtn").addEventListener("click", () => { const element = document.querySelector(".main-grid"); html2pdf().from(element).save(); });
    // WhatsApp
    document.getElementById("whatsappBtn").addEventListener("click", () => { const pred = userPredictions[currentTab]?.[currentSignId]; if(pred) { const msg = `*${currentTab} Horoscope*:\nOverall: ${pred.overall}\nLove: ${pred.love}\nCareer: ${pred.career}`; window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`); } });
    // Email
    document.getElementById("emailBtn").addEventListener("click", () => { const pred = userPredictions[currentTab]?.[currentSignId]; if(pred) { window.location.href = `mailto:?subject=My Horoscope&body=${encodeURIComponent(JSON.stringify(pred, null, 2))}`; } });
    // Voice Input
    document.getElementById("voiceBtn").addEventListener("click", () => { const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); recognition.lang = currentLang === "hi" ? "hi-IN" : "en-US"; recognition.onresult = (e) => { const text = e.results[0][0].transcript; const active = document.activeElement; if(active && active.hasAttribute("data-field")) { active.value = text; active.dispatchEvent(new Event("change")); } else { alert("Click inside a prediction field first!"); } }; recognition.start(); });
    // Theme
    document.getElementById("themeToggle").addEventListener("click", () => { document.body.classList.toggle("dark"); document.body.classList.toggle("light"); });
    // Language
    document.getElementById("langSelect").addEventListener("change", (e) => { currentLang = e.target.value; loadSigns(); render(); });
    // Search Date
    document.getElementById("searchBtn").addEventListener("click", () => { const date = document.getElementById("searchDate").value; if(date) { alert(`Searching for ${date} - Feature: You can load custom date data here`); } });
    // Sign + Tab events
    document.getElementById("signSelect").addEventListener("change", (e) => { currentSignId = e.target.value; render(); });
    document.querySelectorAll(".tab-btn").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentTab = btn.getAttribute("data-tab"); render(); }); });

    loadSigns();
    render();
</script>
</body>
</html>
