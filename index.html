<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivanetra - Horoscope</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffd89b;
        }
        .landing {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #ffd89b;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }
        .birthday-group {
            display: flex;
            gap: 10px;
        }
        .birthday-group select {
            flex: 1;
        }
        button {
            background: #ff6b6b;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 5px;
        }
        button:hover {
            background: #ff5252;
        }
        .main-app {
            display: none;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        .page {
            display: none;
            background: rgba(255,255,255,0.08);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .page.active {
            display: block;
        }
        .sign-select {
            text-align: center;
            margin: 20px 0;
        }
        .sign-select select {
            padding: 10px 20px;
            font-size: 16px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 30px;
        }
        .prediction-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .prediction-box h3 {
            color: #ffd89b;
            margin-bottom: 10px;
        }
        .prediction-box input, .prediction-box textarea {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: none;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .user-info {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: green;
            padding: 10px 20px;
            border-radius: 10px;
            display: none;
        }
        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Shivanetra Horoscope ✨</h1>

    <!-- LANDING PAGE -->
    <div id="landingPage" class="landing">
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="userName" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Birthday</label>
            <div class="birthday-group">
                <select id="daySelect"><option value="">Day</option></select>
                <select id="monthSelect"><option value="">Month</option></select>
                <select id="yearSelect"><option value="">Year</option></select>
            </div>
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" id="location" placeholder="Dhaka, New York, London">
        </div>
        <button id="enterBtn">🔮 Enter Horoscope 🔮</button>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="main-app">
        <div id="userInfo" class="user-info"></div>

        <div class="sign-select">
            <select id="zodiacSelect">
                <option value="aries">Aries</option>
                <option value="taurus">Taurus</option>
                <option value="gemini" selected>Gemini</option>
                <option value="cancer">Cancer</option>
                <option value="leo">Leo</option>
                <option value="virgo">Virgo</option>
                <option value="libra">Libra</option>
                <option value="scorpio">Scorpio</option>
                <option value="sagittarius">Sagittarius</option>
                <option value="capricorn">Capricorn</option>
                <option value="aquarius">Aquarius</option>
                <option value="pisces">Pisces</option>
            </select>
        </div>

        <div class="nav-buttons">
            <button id="prevBtn" disabled>◀ Previous</button>
            <span id="pageNum" style="padding: 10px;">Page 1 of 5</span>
            <button id="nextBtn">Next ▶</button>
        </div>

        <!-- PAGE 1: TODAY -->
        <div id="page1" class="page active">
            <h2>📅 TODAY'S HOROSCOPE</h2>
            <div id="todayPred"></div>
        </div>

        <!-- PAGE 2: DAILY -->
        <div id="page2" class="page">
            <h2>⭐ DAILY PREDICTION</h2>
            <div style="background:#ff6b6b;padding:15px;border-radius:15px;margin-bottom:20px">
                <h3>🌟 GEMINI OVERALL</h3>
                <p id="geminiOverall">Curious mind, excellent communication, double the energy today!</p>
            </div>
            <div id="dailyPred"></div>
        </div>

        <!-- PAGE 3: NATAL CHART -->
        <div id="page3" class="page">
            <h2>⭐ NATAL CHART</h2>
            <div id="natalPred"></div>
        </div>

        <!-- PAGE 4: WEEKLY -->
        <div id="page4" class="page">
            <h2>📆 WEEKLY HOROSCOPE</h2>
            <div id="weeklyPred"></div>
        </div>

        <!-- PAGE 5: MONTHLY -->
        <div id="page5" class="page">
            <h2>🌙 MONTHLY HOROSCOPE</h2>
            <div id="monthlyPred"></div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button id="saveDataBtn">💾 Save All Data</button>
            <button id="downloadPageBtn">📄 Download This Page</button>
        </div>
    </div>
</div>

<div id="message" class="message"></div>

<script>
    // ============================================
    // DEFAULT PREDICTIONS FOR ALL SIGNS
    // ============================================
    const defaultData = {
        today: {},
        daily: {},
        natal: {},
        weekly: {},
        monthly: {}
    };

    const signs = ["aries","taurus","gemini","cancer","leo","virgo","libra","scorpio","sagittarius","capricorn","aquarius","pisces"];
    const signNames = {
        aries:"Aries", taurus:"Taurus", gemini:"Gemini", cancer:"Cancer", leo:"Leo", virgo:"Virgo",
        libra:"Libra", scorpio:"Scorpio", sagittarius:"Sagittarius", capricorn:"Capricorn", aquarius:"Aquarius", pisces:"Pisces"
    };

    // Fill default data
    signs.forEach(sign => {
        defaultData.today[sign] = {
            overall: "Energetic day ahead",
            love: "Romantic sparks fly",
            career: "New opportunity knocks",
            health: "Great energy levels",
            travel: "Short trip fruitful",
            finance: "Steady income",
            luck: 85,
            color: "Red",
            number: "7"
        };
        defaultData.daily[sign] = {
            overall: sign === "gemini" ? "Gemini: Curious mind, excellent communication, double the energy today!" : "Productive and focused day",
            love: "Heartfelt connections",
            career: "Steady progress",
            health: "Stay active",
            travel: "Local trips good",
            finance: "Save wisely",
            luck: 75,
            color: "Yellow",
            number: "3"
        };
        defaultData.natal[sign] = {
            sunSign: signNames[sign],
            moonSign: "Calculated from birthday",
            risingSign: "Depends on birth time",
            element: sign === "aries"||sign==="leo"||sign==="sagittarius" ? "Fire" : (sign==="taurus"||sign==="virgo"||sign==="capricorn" ? "Earth" : (sign==="gemini"||sign==="libra"||sign==="aquarius" ? "Air" : "Water")),
            rulingPlanet: sign==="aries"?"Mars":sign==="taurus"?"Venus":sign==="gemini"?"Mercury":sign==="cancer"?"Moon":sign==="leo"?"Sun":sign==="virgo"?"Mercury":sign==="libra"?"Venus":sign==="scorpio"?"Pluto":sign==="sagittarius"?"Jupiter":sign==="capricorn"?"Saturn":sign==="aquarius"?"Uranus":"Neptune",
            strength: "Adaptable",
            weakness: "Restless"
        };
        defaultData.weekly[sign] = {
            overall: "Great week coming",
            love: "Romance blooms midweek",
            career: "Projects succeed",
            health: "Stay hydrated",
            travel: "Weekend trip ideal",
            finance: "Savings grow",
            luck: 80,
            color: "Gold",
            number: "5"
        };
        defaultData.monthly[sign] = {
            overall: "Transformative month",
            love: "Deep connection forms",
            career: "Promotion likely",
            health: "Energy high",
            travel: "Long journey blessed",
            finance: "Wealth increases",
            luck: 85,
            color: "Blue",
            number: "9"
        };
    });

    // Load saved data or use default
    let userData = JSON.parse(localStorage.getItem("shivanetra_data"));
    if (!userData) {
        userData = JSON.parse(JSON.stringify(defaultData));
    }

    let currentSign = "gemini";
    let currentPage = 1;
    let userName = "";
    let userBirthday = "";
    let userLocation = "";

    // Helper functions
    function showMessage(msg) {
        const msgDiv = document.getElementById("message");
        msgDiv.textContent = msg;
        msgDiv.style.display = "block";
        setTimeout(() => msgDiv.style.display = "none", 3000);
    }

    // Render predictions for a specific sign and page type
    function renderPage(pageType, containerId, fields, showLuck = true) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        const data = userData[pageType]?.[currentSign] || {};
        let html = '<div class="grid-2">';
        
        fields.forEach(field => {
            let value = data[field];
            if (value === undefined) value = "";
            if (field === "luck") value = data.luck || 50;
            
            if (field === "color" || field === "number") {
                html += `
                    <div class="prediction-box">
                        <h3>${field.toUpperCase()}</h3>
                        <input type="text" id="${pageType}_${field}" value="${escapeHtml(value)}" data-type="${pageType}" data-field="${field}">
                    </div>
                `;
            } else if (field === "luck" && showLuck) {
                html += `
                    <div class="prediction-box">
                        <h3>LUCK (0-100)</h3>
                        <input type="range" id="${pageType}_luck" min="0" max="100" value="${value}" data-type="${pageType}" data-field="luck">
                        <span id="${pageType}_luck_val">${value}%</span>
                    </div>
                `;
            } else {
                html += `
                    <div class="prediction-box">
                        <h3>${field.toUpperCase()}</h3>
                        <textarea id="${pageType}_${field}" rows="2" data-type="${pageType}" data-field="${field}">${escapeHtml(value)}</textarea>
                    </div>
                `;
            }
        });
        
        html += '</div>';
        container.innerHTML = html;
        
        // Attach save events
        document.querySelectorAll(`#${containerId} input, #${containerId} textarea`).forEach(el => {
            el.addEventListener("change", function() {
                const type = this.getAttribute("data-type");
                const field = this.getAttribute("data-field");
                let newVal = this.value;
                if (field === "luck") newVal = parseInt(newVal);
                if (!userData[type]) userData[type] = {};
                if (!userData[type][currentSign]) userData[type][currentSign] = {};
                userData[type][currentSign][field] = newVal;
                
                if (field === "luck") {
                    const valSpan = document.getElementById(`${type}_luck_val`);
                    if (valSpan) valSpan.innerText = newVal + "%";
                }
            });
            
            if (el.type === "range") {
                el.addEventListener("input", function() {
                    const valSpan = document.getElementById(`${this.getAttribute("data-type")}_luck_val`);
                    if (valSpan) valSpan.innerText = this.value + "%";
                });
            }
        });
    }

    function renderAllPages() {
        // Page 1: Today
        renderPage("today", "todayPred", ["overall","love","career","health","travel","finance","color","number"], true);
        
        // Page 2: Daily
        renderPage("daily", "dailyPred", ["overall","love","career","health","travel","finance","color","number"], true);
        
        // Page 3: Natal Chart
        renderPage("natal", "natalPred", ["sunSign","moonSign","risingSign","element","rulingPlanet","strength","weakness"], false);
        
        // Page 4: Weekly
        renderPage("weekly", "weeklyPred", ["overall","love","career","health","travel","finance","color","number","luck"], true);
        
        // Page 5: Monthly
        renderPage("monthly", "monthlyPred", ["overall","love","career","health","travel","finance","color","number","luck"], true);
        
        // Update Gemini overall text on page 2
        const geminiData = userData.daily?.gemini?.overall;
        if (geminiData) {
            document.getElementById("geminiOverall").innerText = geminiData;
        }
    }

    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, m => m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;");
    }

    function showPage(pageNum) {
        for (let i = 1; i <= 5; i++) {
            const page = document.getElementById(`page${i}`);
            if (page) page.classList.remove("active");
        }
        const activePage = document.getElementById(`page${pageNum}`);
        if (activePage) activePage.classList.add("active");
        currentPage = pageNum;
        document.getElementById("pageNum").innerText = `Page ${pageNum} of 5`;
        document.getElementById("prevBtn").disabled = (pageNum === 1);
        document.getElementById("nextBtn").disabled = (pageNum === 5);
    }

    // Initialize birthday dropdowns
    function initBirthdays() {
        const daySel = document.getElementById("daySelect");
        for (let i = 1; i <= 31; i++) {
            let opt = document.createElement("option");
            opt.value = i;
            opt.textContent = i;
            daySel.appendChild(opt);
        }
        const monthSel = document.getElementById("monthSelect");
        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        months.forEach((m, i) => {
            let opt = document.createElement("option");
            opt.value = i+1;
            opt.textContent = m;
            monthSel.appendChild(opt);
        });
        const yearSel = document.getElementById("yearSelect");
        for (let i = 2024; i >= 1900; i--) {
            let opt = document.createElement("option");
            opt.value = i;
            opt.textContent = i;
            yearSel.appendChild(opt);
        }
    }

    // ENTER button
    document.getElementById("enterBtn").addEventListener("click", () => {
        userName = document.getElementById("userName").value || "Guest";
        const day = document.getElementById("daySelect").value;
        const month = document.getElementById("monthSelect").value;
        const year = document.getElementById("yearSelect").value;
        userBirthday = `${day}/${month}/${year}`;
        userLocation = document.getElementById("location").value || "Unknown";
        
        document.getElementById("landingPage").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("userInfo").innerHTML = `👤 ${userName} | 📍 ${userLocation} | 🎂 ${userBirthday}`;
        
        renderAllPages();
        showMessage(`Welcome ${userName}!`);
    });

    // Sign change
    document.getElementById("zodiacSelect").addEventListener("change", (e) => {
        currentSign = e.target.value;
        renderAllPages();
    });

    // Save button
    document.getElementById("saveDataBtn").addEventListener("click", () => {
        localStorage.setItem("shivanetra_data", JSON.stringify(userData));
        showMessage("✅ All data saved!");
    });

    // DOWNLOAD button - saves the ENTIRE page with ALL data
    document.getElementById("downloadPageBtn").addEventListener("click", () => {
        // Save current data first
        localStorage.setItem("shivanetra_data", JSON.stringify(userData));
        
        // Create a complete HTML document
        const fullHtml = document.documentElement.outerHTML;
        const blob = new Blob([fullHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Shivanetra_${userName || "User"}_Complete.html`;
        a.click();
        URL.revokeObjectURL(url);
        showMessage("📄 Complete page downloaded! All 5 pages included.");
    });

    // Navigation
    document.getElementById("prevBtn").addEventListener("click", () => {
        if (currentPage > 1) showPage(currentPage - 1);
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
        if (currentPage < 5) showPage(currentPage + 1);
    });

    // Load saved user profile
    initBirthdays();
    showPage(1);
</script>
</body>
</html>
