<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #4a0000;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;

            max-width: 800px;

        /* landing page & results page */

            background: white;

        .hidden {
            display: none;
        }
        h1 {
            color: #4a0000;
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
            margin-bottom: 4px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #aaa;
            border-radius: 8px;
            background: #fefefe;
        }
        button {
            background: #4a0000;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        button:hover {
            background: #cc0000;
        }
        .home-btn {
            background: #1B5E20;
            margin-top: 10px;
        }
        .result-section {
            margin: 20px 0;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        .result-item {
            margin: 10px 0;
            padding: 8px;
            background: #f9f9f9;
            border-left: 4px solid #4a0000;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7em;
            color: #ffaa88;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- LANDING PAGE (input form) -->
    <div id="landingPage" class="page">
        <h1>🌀 SHIVANETRA</h1>
        <p style="text-align:center; margin-bottom:20px;">Enter your birth details for celestial guidance</p>
        
        <label>Full Name</label>
        <input type="text" id="userName" placeholder="e.g., Seliim Ahmed">
        
        <label>Date of Birth</label>
        <input type="date" id="dob">
        
        <label>Location (City, Country)</label>
        <input type="text" id="location" placeholder="Dhaka, Bangladesh">
        
        <label>Time of Birth</label>
        <div style="display:flex; gap:10px;">
            <input type="number" id="hour" placeholder="Hour (1-12)" min="1" max="12" style="width:33%">
            <input type="number" id="minute" placeholder="Minute" min="0" max="59" style="width:33%">
            <select id="ampm" style="width:33%">
                <option value="AM">AM</option>
                <option value="PM">PM</option>
            </select>
        </div>
        
        <button id="calculateBtn">✨ Reveal My Chart ✨</button>
    </div>

    <!-- RESULTS PAGE (hidden initially) -->
    <div id="resultsPage" class="page hidden">
        <div id="resultsContent"></div>
        <button id="homeBtn" class="home-btn">🏠 Home / New Reading</button>
        <button id="downloadResultsBtn">📥 Download Results (HTML)</button>
    </div>

    <div class="footer">
        Shivanetra · Sidereal calculations · 12 Zodiac folders + Numerology engine
    </div>
</div>

<script>
    // ------------------------------
    // 1. Helper: Zodiac sign from date of birth
    // ------------------------------
    function getZodiacSign(month, day) {
        if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "aries";
        if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "taurus";
        if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return "gemini";
        if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return "cancer";
        if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "leo";
        if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "virgo";
        if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "libra";
        if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return "scorpio";
        if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "sagittarius";
        if ((month == 12 && day >= 22) || (month == 1 && day <= 19)) return "capricorn";
        if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "aquarius";
        return "pisces"; // Feb 19 - Mar 20
    }

    // ------------------------------
    // 2. Numerology: Life Path Number (simplified)
    // ------------------------------
    function getLifePathNumber(dobStr) {
        // dobStr format YYYY-MM-DD
        let sum = 0;
        let digits = dobStr.replace(/-/g, '').split('');
        for (let d of digits) sum += parseInt(d);
        while (sum > 9 && sum !== 11 && sum !== 22) {
            let s = 0;
            while (sum > 0) { s += sum % 10; sum = Math.floor(sum / 10); }
            sum = s;
        }
        return sum;
    }

    // ------------------------------
    // 4. Numerology folder (additional predictions)
    // ------------------------------
    function getNumerologyPrediction(lifePath) {
        const numMap = {
            1: "Leader, independent. New beginnings. Avoid arrogance.",
            2: "Diplomat, peacemaker. Partnerships thrive. Avoid indecision.",
            3: "Creative, expressive. Joy through art. Avoid scattering energy.",

            5: "Adventurer, freedom-loving. Embrace change. Avoid recklessness.",

            7: "Thinker, spiritual. Seek wisdom. Avoid isolation.",

            11: "Master teacher, intuitive. High spiritual insight. Avoid anxiety.",

        };
        return numMap[lifePath] || "Unique energy; seek balance.";

    // ------------------------------
    // 5. Main calculation & display
    // ------------------------------
    function calculateAndShow() {
        // get values
        const name = document.getElementById('userName').value.trim();
        const dob = document.getElementById('dob').value;
        const location = document.getElementById('location').value.trim();
        const hour = parseInt(document.getElementById('hour').value);
        const minute = parseInt(document.getElementById('minute').value);
        const ampm = document.getElementById('ampm').value;

        if (!name || !dob || !location || isNaN(hour) || isNaN(minute)) {
            alert("Please fill all fields correctly.");
            return;
        }

        // parse dob
        const dobParts = dob.split('-');
        const year = parseInt(dobParts[0]);
        const month = parseInt(dobParts[1]);
        const day = parseInt(dobParts[2]);
        const zodiacKey = getZodiacSign(month, day);
        const zodiacName = zodiacKey.charAt(0).toUpperCase() + zodiacKey.slice(1);
        const lifePath = getLifePathNumber(dob);
        const numerologyText = getNumerologyPrediction(lifePath);

        // time string
        let timeStr = `${hour}:${minute.toString().padStart(2,'0')} ${ampm}`;
        
        // get zodiac data
        const zd = zodiacData[zodiacKey];

        // build result HTML
        const resultHtml = `
            <h1>🌀 Your Celestial Blueprint</h1>
            <div class="result-section">
                <div class="result-item"><strong>Name:</strong> ${name}</div>
                <div class="result-item"><strong>Birth Date:</strong> ${dob}</div>
                <div class="result-item"><strong>Location:</strong> ${location}</div>
                <div class="result-item"><strong>Birth Time:</strong> ${timeStr}</div>
                <div class="result-item"><strong>Zodiac Sign:</strong> ${zodiacName}</div>
                <div class="result-item"><strong>Life Path Number:</strong> ${lifePath}</div>
            </div>
            <div class="result-section">
                <h3>✨ Astrological Guidance (${zodiacName})</h3>
                <p><strong>Overview:</strong> ${zd.overview}</p>
                <p><strong>😇 Good:</strong> ${zd.good}</p>
                <p><strong>⚠️ Bad:</strong> ${zd.bad}</p>
                <p><strong>🏆 Best:</strong> ${zd.best}</p>
            </div>
            <div class="result-section">
                <h3>🔢 Numerology Reading</h3>
                <p>${numerologyText}</p>
            </div>
            <div class="result-section">
                <h3>📅 Today's Forecast (based on your chart)</h3>
                <p><strong>Day:</strong> ${zd.day}</p>
                <p><strong>Travel:</strong> ${zd.travel}</p>
                <p><strong>Money:</strong> ${zd.money}</p>
                <p><strong>Accident / Safety:</strong> ${zd.accident}</p>
                <p><strong>Events:</strong> ${zd.event}</p>
            </div>
            <div class="result-section">
                <p style="font-style:italic;">Data derived from 12 zodiac folders + numerology backend simulation.</p>

        `;

        document.getElementById('resultsContent').innerHTML = resultHtml;
        // swap pages
        document.getElementById('landingPage').classList.add('hidden');
        document.getElementById('resultsPage').classList.remove('hidden');
    }

    // home button: go back to landing page
    function goHome() {
        document.getElementById('landingPage').classList.remove('hidden');
        document.getElementById('resultsPage').classList.add('hidden');
        // optionally clear form? keep as is, or reset? we can reset to empty
        document.getElementById('userName').value = '';
        document.getElementById('dob').value = '';
        document.getElementById('location').value = '';
        document.getElementById('hour').value = '';
        document.getElementById('minute').value = '';
        document.getElementById('ampm').value = 'AM';
    }

    // download results page as HTML
    function downloadResults() {
        const resultsDiv = document.getElementById('resultsContent');
        const content = resultsDiv.innerHTML;
        const fullHtml = `<!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>Shivanetra Report</title><style>
            body { font-family: monospace; padding: 40px; background: #f0f0f0; }
            .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 16px; }
            h1 { color: #4a0000; }
        </style></head>
        <body><div class="container">${content}</div></body>
        </html>`;
        const blob = new Blob([fullHtml], {type: 'text/html'});
        const link = document.createElement('a');
        link.download = `shivanetra_${new Date().toISOString().slice(0,19)}.html`;
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
    }

    // attach event listeners
    document.getElementById('calculateBtn').addEventListener('click', calculateAndShow);
    document.getElementById('homeBtn').addEventListener('click', goHome);
    document.getElementById('downloadResultsBtn').addEventListener('click', downloadResults);
