<!DOCTYPE html>
<html>
<head>
    <title>Shivanetra Horoscope</title>
    <meta charset="UTF-8">
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: Arial;
            padding: 20px;
        }
        .container { max-width: 800px; margin: auto; }
        .page {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        button {
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            border: none;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Shivanetra Horoscope ✨</h1>

    <!-- LANDING -->
    <div id="landing" class="page">
        <h2>Enter Your Details</h2>
        <input type="text" id="name" placeholder="Your Name">
        <input type="text" id="location" placeholder="Location (Dhaka, New York, etc)">
        <div style="display:flex; gap:10px; margin:10px 0;">
            <select id="day"><option>Day</option></select>
            <select id="month"><option>Month</option></select>
            <select id="year"><option>Year</option></select>
        </div>
        <button onclick="enterApp()">🔮 Enter Horoscope</button>
    </div>

    <!-- MAIN APP -->
    <div id="app" style="display:none;">
        <div id="userInfo" style="background:#0f3460; padding:10px; border-radius:10px; margin:10px 0;"></div>
        
        <select id="sign" onchange="loadPredictions()">
            <option value="aries">Aries</option><option value="taurus">Taurus</option>
            <option value="gemini" selected>Gemini</option><option value="cancer">Cancer</option>
            <option value="leo">Leo</option><option value="virgo">Virgo</option>
            <option value="libra">Libra</option><option value="scorpio">Scorpio</option>
            <option value="sagittarius">Sagittarius</option><option value="capricorn">Capricorn</option>
            <option value="aquarius">Aquarius</option><option value="pisces">Pisces</option>
        </select>

        <div class="nav">
            <button id="prevBtn" onclick="changePage(-1)">◀ Previous</button>
            <span id="pageIndicator">Page 1 of 5</span>
            <button id="nextBtn" onclick="changePage(1)">Next ▶</button>
        </div>

        <!-- PAGE 1: TODAY -->
        <div id="page1" class="page-content active">
            <h2>📅 Today's Horoscope</h2>
            <div id="todayBox"></div>
        </div>

        <!-- PAGE 2: DAILY -->
        <div id="page2" class="page-content">
            <h2>⭐ Daily Prediction</h2>
            <div style="background:#ff6b6b; padding:15px; border-radius:15px;">
                <h3>✨ Gemini Overall</h3>
                <p id="geminiOverallText">Loading...</p>
            </div>
            <div id="dailyBox"></div>
        </div>

        <!-- PAGE 3: NATAL CHART -->
        <div id="page3" class="page-content">
            <h2>⭐ Natal Chart</h2>
            <div id="natalBox"></div>
        </div>

        <!-- PAGE 4: WEEKLY -->
        <div id="page4" class="page-content">
            <h2>📆 Weekly Horoscope</h2>
            <div id="weeklyBox"></div>
        </div>

        <!-- PAGE 5: MONTHLY -->
        <div id="page5" class="page-content">
            <h2>🌙 Monthly Horoscope</h2>
            <div id="monthlyBox"></div>
        </div>

        <div style="text-align:center; margin-top:20px;">
            <button onclick="saveAll()">💾 Save All</button>
            <button onclick="downloadPage()">📄 Download Complete Page</button>
        </div>
    </div>
</div>

<script>
    // Default data structure
    let data = {
        today: {}, daily: {}, natal: {}, weekly: {}, monthly: {}
    };
    
    let currentSign = "gemini";
    let currentPage = 1;
    let userName = "", userLocation = "", userBirthday = "";

    // Populate day/month/year dropdowns
    function initBirthdays() {
        for(let i=1;i<=31;i++) document.getElementById("day").innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=1;i<=12;i++) document.getElementById("month").innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=2024;i>=1900;i--) document.getElementById("year").innerHTML += `<option value="${i}">${i}</option>`;
    }

    // Generate default data for all signs
    const signs = ["aries","taurus","gemini","cancer","leo","virgo","libra","scorpio","sagittarius","capricorn","aquarius","pisces"];
    signs.forEach(s => {
        data.today[s] = { overall:"Great energy", love:"Romantic", career:"New chance", health:"Good", travel:"Short trip", finance:"Stable", luck:85, color:"Red", number:"7" };
        data.daily[s] = { overall:s=="gemini"?"Gemini: Curious, communicative, energetic!":"Productive day", love:"Sweet moments", career:"Progress", health:"Active", travel:"Local", finance:"Save", luck:75, color:"Yellow", number:"3" };
        data.natal[s] = { sunSign:s.charAt(0).toUpperCase()+s.slice(1), moonSign:"Cancer", risingSign:"Libra", element:s=="aries"||s=="leo"||s=="sagittarius"?"Fire":s=="taurus"||s=="virgo"||s=="capricorn"?"Earth":s=="gemini"||s=="libra"||s=="aquarius"?"Air":"Water", rulingPlanet:s=="aries"?"Mars":"Venus", strength:"Adaptable", weakness:"Restless" };
        data.weekly[s] = { overall:"Good week", love:"Romance blooms", career:"Success", health:"Rest", travel:"Weekend trip", finance:"Grows", luck:80, color:"Gold", number:"5" };
        data.monthly[s] = { overall:"Transformative", love:"Deep connection", career:"Promotion", health:"High energy", travel:"Long journey", finance:"Wealth", luck:85, color:"Blue", number:"9" };
    });

    function escapeHtml(str) { return String(str || "").replace(/[&<>]/g, m => m=="&"?"&amp;":m=="<"?"&lt;":"&gt;"); }

    function renderBox(containerId, type, fields, showLuck) {
        let pred = data[type][currentSign] || {};
        let html = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">`;
        fields.forEach(f => {
            let val = pred[f];
            if(f=="luck") val = pred.luck || 50;
            if(f=="color" || f=="number") {
                html += `<div style="background:rgba(0,0,0,0.3); padding:12px; border-radius:10px;">
                            <strong>${f.toUpperCase()}</strong><br>
                            <input type="text" value="${escapeHtml(val)}" onchange="updateData('${type}','${f}',this.value)">
                        </div>`;
            } else if(f=="luck" && showLuck) {
                html += `<div style="background:rgba(0,0,0,0.3); padding:12px; border-radius:10px;">
                            <strong>LUCK</strong><br>
                            <input type="range" min="0" max="100" value="${val}" oninput="this.nextElementSibling.innerText=this.value+'%'" onchange="updateData('${type}','luck',this.value)">
                            <span>${val}%</span>
                        </div>`;
            } else {
                html += `<div style="background:rgba(0,0,0,0.3); padding:12px; border-radius:10px;">
                            <strong>${f.toUpperCase()}</strong><br>
                            <textarea rows="2" onchange="updateData('${type}','${f}',this.value)">${escapeHtml(val)}</textarea>
                        </div>`;
            }
        });
        html += `</div>`;
        document.getElementById(containerId).innerHTML = html;
    }

    function loadPredictions() {
        currentSign = document.getElementById("sign").value;
        renderBox("todayBox", "today", ["overall","love","career","health","travel","finance","color","number"], true);
        renderBox("dailyBox", "daily", ["overall","love","career","health","travel","finance","color","number"], true);
        renderBox("natalBox", "natal", ["sunSign","moonSign","risingSign","element","rulingPlanet","strength","weakness"], false);
        renderBox("weeklyBox", "weekly", ["overall","love","career","health","travel","finance","color","number","luck"], true);
        renderBox("monthlyBox", "monthly", ["overall","love","career","health","travel","finance","color","number","luck"], true);
        
        let geminiDaily = data.daily.gemini?.overall || "Gemini: Curious mind today!";
        document.getElementById("geminiOverallText").innerText = geminiDaily;
    }

    function updateData(type, field, value) {
        if(!data[type][currentSign]) data[type][currentSign] = {};
        data[type][currentSign][field] = field=="luck" ? parseInt(value) : value;
    }

    function saveAll() { localStorage.setItem("shivanetraData", JSON.stringify(data)); alert("Saved!"); }
    
    function downloadPage() {
        let html = document.documentElement.outerHTML;
        let blob = new Blob([html], {type:"text/html"});
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Shivanetra_${userName || "User"}_Complete.html`;
        a.click();
        URL.revokeObjectURL(blob);
    }

    function changePage(delta) {
        document.getElementById(`page${currentPage}`).classList.remove("active");
        currentPage += delta;
        if(currentPage<1) currentPage=1;
        if(currentPage>5) currentPage=5;
        document.getElementById(`page${currentPage}`).classList.add("active");
        document.getElementById("pageIndicator").innerText = `Page ${currentPage} of 5`;
        document.getElementById("prevBtn").disabled = currentPage==1;
        document.getElementById("nextBtn").disabled = currentPage==5;
    }

    function enterApp() {
        userName = document.getElementById("name").value || "Guest";
        let day = document.getElementById("day").value;
        let month = document.getElementById("month").value;
        let year = document.getElementById("year").value;
        userBirthday = `${day}/${month}/${year}`;
        userLocation = document.getElementById("location").value || "Unknown";
        
        let saved = localStorage.getItem("shivanetraData");
        if(saved) data = JSON.parse(saved);
        
        document.getElementById("landing").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("userInfo").innerHTML = `👤 ${userName} | 📍 ${userLocation} | 🎂 ${userBirthday}`;
        loadPredictions();
    }

    initBirthdays();
</script>
</body>
</html>
