<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivanetra - Complete Horoscope</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #ff6b6b;
            box-shadow: 0 0 15px rgba(255,107,107,0.5);
        }
        .tab-btn:hover {
            background: #ff6b6b;
        }
        /* Form */
        .sign-selector {
            text-align: center;
            margin-bottom: 30px;
        }
        select {
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: none;
            background: #0f3460;
            color: #fff;
            cursor: pointer;
            min-width: 200px;
        }
        /* Prediction Card */
        .prediction-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .category {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
        }
        .category h3 {
            margin-bottom: 10px;
            color: #ffd89b;
        }
        .category p {
            line-height: 1.5;
        }
        /* Chart / Meter */
        .meter {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ffd89b);
            border-radius: 10px;
            transition: width 0.5s;
        }
        .chart-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            align-items: center;
        }
        .chart-label {
            width: 80px;
        }
        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        .btn-save {
            background: #4caf50;
            color: white;
        }
        .btn-download {
            background: #2196f3;
            color: white;
        }
        .btn-reset {
            background: #ff9800;
            color: white;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .message.show {
            display: block;
        }
        .message.success {
            background: #4caf50;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            opacity: 0.7;
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .category-grid {
                grid-template-columns: 1fr;
            }
            .tab-btn {
                padding: 8px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ Shivanetra Horoscope ✨</h1>

    <div class="tabs">
        <button class="tab-btn active" data-tab="today">📅 Today</button>
        <button class="tab-btn" data-tab="tomorrow">🌅 Tomorrow</button>
        <button class="tab-btn" data-tab="weekly">📆 Weekly</button>
        <button class="tab-btn" data-tab="monthly">🌙 Monthly</button>
    </div>

    <div class="sign-selector">
        <select id="signSelect">
            <option value="">-- Select Your Zodiac Sign --</option>
        </select>
    </div>

    <div id="predictionDisplay" class="prediction-card">
        <h2 id="signTitle">Select a sign</h2>
        <div id="categoryContainer" class="category-grid"></div>
        <div id="chartContainer"></div>
        <div class="action-buttons">
            <button class="btn-save" id="saveBtn">💾 Save Predictions</button>
            <button class="btn-download" id="downloadBtn">📥 Download HTML (My Data)</button>
            <button class="btn-reset" id="resetBtn">🔄 Reset to Default</button>
        </div>
        <div id="message" class="message"></div>
    </div>
    <footer>Predictions are saved in your browser. Edit any text field and click Save.</footer>
</div>

<script>
    // ============ SIGNS DATA ============
    const signsData = {
        "zodiac_signs": [
            { "id": "aries", "name": "Aries", "symbol": "Ram", "start_date": "March 21", "end_date": "April 19" },
            { "id": "taurus", "name": "Taurus", "symbol": "Bull", "start_date": "April 20", "end_date": "May 20" },
            { "id": "gemini", "name": "Gemini", "symbol": "Twins", "start_date": "May 21", "end_date": "June 20" },
            { "id": "cancer", "name": "Cancer", "symbol": "Crab", "start_date": "June 21", "end_date": "July 22" },
            { "id": "leo", "name": "Leo", "symbol": "Lion", "start_date": "July 23", "end_date": "August 22" },
            { "id": "virgo", "name": "Virgo", "symbol": "Virgin", "start_date": "August 23", "end_date": "September 22" },
            { "id": "libra", "name": "Libra", "symbol": "Scales", "start_date": "September 23", "end_date": "October 22" },
            { "id": "scorpio", "name": "Scorpio", "symbol": "Scorpion", "start_date": "October 23", "end_date": "November 21" },
            { "id": "sagittarius", "name": "Sagittarius", "symbol": "Archer", "start_date": "November 22", "end_date": "December 21" },
            { "id": "capricorn", "name": "Capricorn", "symbol": "Sea-goat", "start_date": "December 22", "end_date": "January 19" },
            { "id": "aquarius", "name": "Aquarius", "symbol": "Water Bearer", "start_date": "January 20", "end_date": "February 18" },
            { "id": "pisces", "name": "Pisces", "symbol": "Fish", "start_date": "February 19", "end_date": "March 20" }
        ]
    };

    // Default predictions template (with Travel & Finance)
    const defaultPredictions = {
        "today": {
            "aries": { overall: "Energetic day", love: "Romantic sparks", career: "New opportunity", health: "Great energy", travel: "Short trip fruitful", finance: "Steady income", luck: 85, color: "Red", number: "7" },
            "taurus": { overall: "Stable and calm", love: "Deep connection", career: "Steady progress", health: "Good", travel: "Avoid long trips", finance: "Save money", luck: 70, color: "Green", number: "4" },
            "gemini": { overall: "Curious mind", love: "Flirty vibes", career: "Meetings", health: "Rest needed", travel: "Exciting plans", finance: "Unexpected gain", luck: 90, color: "Yellow", number: "3" },
            "cancer": { overall: "Emotional day", love: "Family time", career: "Supportive", health: "Hydrate", travel: "Visit water", finance: "Budget well", luck: 65, color: "White", number: "2" },
            "leo": { overall: "Shine bright", love: "Passionate", career: "Leadership", health: "Exercise", travel: "Luxury trip", finance: "Investment good", luck: 95, color: "Gold", number: "1" },
            "virgo": { overall: "Productive", love: "Practical love", career: "Details matter", health: "Healthy eating", travel: "Plan ahead", finance: "Analyze", luck: 75, color: "Brown", number: "5" },
            "libra": { overall: "Balanced", love: "Romantic date", career: "Teamwork", health: "Yoga helps", travel: "Partner travel", finance: "Fair deals", luck: 80, color: "Pink", number: "6" },
            "scorpio": { overall: "Intense", love: "Deep trust", career: "Transformation", health: "Detox", travel: "Mysterious place", finance: "Hidden money", luck: 88, color: "Black", number: "8" },
            "sagittarius": { overall: "Adventure", love: "Free spirit", career: "Expansion", health: "Outdoor", travel: "Perfect time", finance: "Spend on fun", luck: 92, color: "Purple", number: "9" },
            "capricorn": { overall: "Focused", love: "Commitment", career: "Promotion", health: "Discipline", travel: "Business trip", finance: "Wealth grows", luck: 78, color: "Grey", number: "10" },
            "aquarius": { overall: "Innovative", love: "Unique bond", career: "Ideas flow", health: "Social energy", travel: "Group trip", finance: "Tech gains", luck: 82, color: "Blue", number: "11" },
            "pisces": { overall: "Dreamy", love: "Romantic fantasy", career: "Artistic", health: "Rest well", travel: "Beach escape", finance: "Intuitive", luck: 87, color: "Sea Green", number: "12" }
        },
        "tomorrow": {},
        "weekly": {},
        "monthly": {}
    };

    // Generate default for all signs for each tab
    const allTabs = ["today", "tomorrow", "weekly", "monthly"];
    allTabs.forEach(tab => {
        if (Object.keys(defaultPredictions[tab]).length === 0) {
            defaultPredictions[tab] = {};
            signsData.zodiac_signs.forEach(sign => {
                const base = defaultPredictions.today[sign.id] || {};
                defaultPredictions[tab][sign.id] = { ...base, overall: `${tab.charAt(0).toUpperCase() + tab.slice(1)} prediction for ${sign.name}` };
            });
        }
    });

    // Load saved or default
    let userPredictions = JSON.parse(localStorage.getItem("shivanetra_predictions"));
    if (!userPredictions) {
        userPredictions = JSON.parse(JSON.stringify(defaultPredictions));
    }

    let currentTab = "today";
    let currentSignId = "";

    // Populate sign dropdown
    function loadSigns() {
        const select = document.getElementById("signSelect");
        select.innerHTML = '<option value="">-- Select Your Zodiac Sign --</option>';
        signsData.zodiac_signs.forEach(sign => {
            const option = document.createElement("option");
            option.value = sign.id;
            option.textContent = `${sign.name} (${sign.start_date} - ${sign.end_date})`;
            select.appendChild(option);
        });
    }

    // Render editable predictions
    function render() {
        if (!currentSignId) {
            document.getElementById("signTitle").innerText = "Select a sign above";
            document.getElementById("categoryContainer").innerHTML = "";
            document.getElementById("chartContainer").innerHTML = "";
            return;
        }

        const sign = signsData.zodiac_signs.find(s => s.id === currentSignId);
        document.getElementById("signTitle").innerHTML = `${sign.name} Horoscope - ${currentTab.toUpperCase()}`;

        let pred = userPredictions[currentTab]?.[currentSignId];
        if (!pred) {
            pred = { overall: "", love: "", career: "", health: "", travel: "", finance: "", luck: 50, color: "", number: "" };
            userPredictions[currentTab] = userPredictions[currentTab] || {};
            userPredictions[currentTab][currentSignId] = pred;
        }

        const categories = [
            { key: "overall", label: "🌟 Overall", icon: "🔮" },
            { key: "love", label: "❤️ Love", icon: "💕" },
            { key: "career", label: "💼 Career", icon: "📈" },
            { key: "health", label: "🏃 Health", icon: "💪" },
            { key: "travel", label: "✈️ Travel", icon: "🌍" },
            { key: "finance", label: "💰 Finance", icon: "💵" },
            { key: "color", label: "🎨 Lucky Color", icon: "🌈" },
            { key: "number", label: "🔢 Lucky Number", icon: "🔢" }
        ];

        let html = `<div class="category-grid">`;
        categories.forEach(cat => {
            let value = pred[cat.key] || "";
            if (cat.key === "luck") value = pred.luck || 50;
            if (cat.key === "color" || cat.key === "number") {
                html += `<div class="category">
                            <h3>${cat.icon} ${cat.label}</h3>
                            <input type="text" data-field="${cat.key}" value="${escapeHtml(value)}" style="width:100%; padding:8px; border-radius:10px; border:none; background:#fff; color:#000;">
                         </div>`;
            } else if (cat.key === "luck") {
                html += `<div class="category">
                            <h3>${cat.icon} ${cat.label} (0-100)</h3>
                            <input type="range" data-field="${cat.key}" min="0" max="100" value="${value}" style="width:100%">
                            <span id="luckValue">${value}%</span>
                         </div>`;
            } else {
                html += `<div class="category">
                            <h3>${cat.icon} ${cat.label}</h3>
                            <textarea data-field="${cat.key}" rows="3" style="width:100%; padding:8px; border-radius:10px; border:none; background:#fff; color:#000;">${escapeHtml(value)}</textarea>
                         </div>`;
            }
        });
        html += `</div>`;

        // Chart for luck only (simple meter)
        const luckVal = pred.luck || 50;
        html += `<div class="chart-row"><span class="chart-label">🍀 Luck Meter</span><div class="meter"><div class="meter-fill" style="width:${luckVal}%"></div></div><span>${luckVal}%</span></div>`;

        document.getElementById("categoryContainer").innerHTML = html;
        document.getElementById("chartContainer").innerHTML = ""; // chart already inside

        // Attach event listeners to inputs
        document.querySelectorAll("[data-field]").forEach(input => {
            input.addEventListener("change", function(e) {
                const field = this.getAttribute("data-field");
                let newVal = this.value;
                if (field === "luck") newVal = parseInt(this.value);
                userPredictions[currentTab][currentSignId][field] = newVal;
                if (field === "luck") {
                    document.getElementById("luckValue").innerText = newVal + "%";
                    const fill = document.querySelector(".meter-fill");
                    if (fill) fill.style.width = newVal + "%";
                }
                showMessage("Changes made — don't forget to Save!", "success");
            });
            if (input.type === "range") {
                input.addEventListener("input", function() {
                    document.getElementById("luckValue").innerText = this.value + "%";
                });
            }
        });
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }

    function showMessage(msg, type) {
        const msgDiv = document.getElementById("message");
        msgDiv.textContent = msg;
        msgDiv.className = `message show ${type}`;
        setTimeout(() => msgDiv.classList.remove("show"), 3000);
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
        localStorage.setItem("shivanetra_predictions", JSON.stringify(userPredictions));
        showMessage("✅ All predictions saved to browser!", "success");
    });

    document.getElementById("downloadBtn").addEventListener("click", () => {
        const dataStr = JSON.stringify(userPredictions, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `shivanetra_predictions_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showMessage("📁 Predictions JSON downloaded", "success");
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
        if (confirm("Reset all predictions to defaults? Your saved data will be lost.")) {
            userPredictions = JSON.parse(JSON.stringify(defaultPredictions));
            localStorage.setItem("shivanetra_predictions", JSON.stringify(userPredictions));
            render();
            showMessage("🔄 Reset to default predictions", "success");
        }
    });

    document.getElementById("signSelect").addEventListener("change", (e) => {
        currentSignId = e.target.value;
        render();
    });

    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentTab = btn.getAttribute("data-tab");
            render();
        });
    });

    loadSigns();
    render();
</script>
</body>
</html>
