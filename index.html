<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivanetra - Horoscope Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* Landing Card */
        .landing-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .form-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffd89b;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.9);
            font-size: 1rem;
        }

        .enter-btn {
            background: #ff6b6b;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.2s;
        }

        .enter-btn:hover {
            transform: scale(1.02);
            background: #ff5252;
        }

        /* Main App (hidden until user enters) */
        .main-app {
            display: none;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tool-btn {
            padding: 10px 20px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .tool-btn:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #ff6b6b;
            box-shadow: 0 0 15px rgba(255,107,107,0.5);
        }

        .sign-selector {
            text-align: center;
            margin-bottom: 30px;
        }

        select {
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: none;
            background: #0f3460;
            color: #fff;
            cursor: pointer;
            min-width: 250px;
        }

        .prediction-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .category {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
        }

        .category h3 {
            margin-bottom: 10px;
            color: #ffd89b;
        }

        .category input, .category textarea {
            width: 100%;
            padding: 8px;
            border-radius: 10px;
            border: none;
            background: #fff;
            color: #000;
        }

        .meter {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ffd89b);
            border-radius: 10px;
            transition: width 0.5s;
        }

        .chart-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            align-items: center;
            flex-wrap: wrap;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-save { background: #4caf50; color: white; }
        .btn-download { background: #2196f3; color: white; }
        .btn-html { background: #9c27b0; color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-email { background: #ff9800; color: white; }

        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }

        .message.show {
            display: block;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            opacity: 0.7;
            padding: 20px;
        }

        .user-info-bar {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 30px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .category-grid {
                grid-template-columns: 1fr;
            }
            .tool-btn, .tab-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ Shivanetra Horoscope Pro ✨</h1>
    <div class="subtitle">Your Daily Cosmic Guide</div>

    <!-- LANDING PAGE -->
    <div id="landingPage" class="landing-card">
        <div class="form-row">
            <div class="form-group">
                <label>🌟 Your Name</label>
                <input type="text" id="userName" placeholder="Enter your name" value="Gemini User">
            </div>
            <div class="form-group">
                <label>🎂 Birthday</label>
                <input type="date" id="userBirthday">
            </div>
            <div class="form-group">
                <label>📍 Location (City, Country)</label>
                <input type="text" id="userLocation" placeholder="e.g., Dhaka, Russia, China, New York" value="Dhaka, Bangladesh">
            </div>
        </div>
        <button class="enter-btn" id="enterBtn">🔮 Enter Your Horoscope 🔮</button>
    </div>

    <!-- MAIN APP (Hidden until Enter) -->
    <div id="mainApp" class="main-app">
        <div class="user-info-bar" id="userInfoBar"></div>

        <div class="toolbar">
            <button class="tool-btn" id="shareWhatsAppBtn">📱 WhatsApp</button>
            <button class="tool-btn" id="emailBtn">✉️ Email</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="today">📅 Today</button>
            <button class="tab-btn" data-tab="tomorrow">🌅 Tomorrow</button>
            <button class="tab-btn" data-tab="weekly">📆 Weekly</button>
            <button class="tab-btn" data-tab="monthly">🌙 Monthly</button>
        </div>

        <div class="sign-selector">
            <select id="signSelect">
                <option value="">-- Select Your Zodiac Sign --</option>
            </select>
        </div>

        <div id="predictionDisplay" class="prediction-card">
            <h2 id="signTitle">Select a sign</h2>
            <div id="categoryContainer" class="category-grid"></div>
            <div id="chartContainer"></div>
            <div class="action-buttons">
                <button class="btn-save" id="saveBtn">💾 Save Predictions</button>
                <button class="btn-download" id="downloadBtn">📥 Download JSON</button>
                <button class="btn-html" id="downloadHtmlBtn">📄 Download HTML</button>
            </div>
        </div>
    </div>

    <footer>Shivanetra - Your Cosmic Journey</footer>
</div>

<div id="message" class="message"></div>

<script>
    // ============ SIGNS DATA ============
    const signsData = {
        "zodiac_signs": [
            { "id": "aries", "name": "Aries", "start_date": "Mar 21 - Apr 19" },
            { "id": "taurus", "name": "Taurus", "start_date": "Apr 20 - May 20" },
            { "id": "gemini", "name": "Gemini", "start_date": "May 21 - Jun 20" },
            { "id": "cancer", "name": "Cancer", "start_date": "Jun 21 - Jul 22" },
            { "id": "leo", "name": "Leo", "start_date": "Jul 23 - Aug 22" },
            { "id": "virgo", "name": "Virgo", "start_date": "Aug 23 - Sep 22" },
            { "id": "libra", "name": "Libra", "start_date": "Sep 23 - Oct 22" },
            { "id": "scorpio", "name": "Scorpio", "start_date": "Oct 23 - Nov 21" },
            { "id": "sagittarius", "name": "Sagittarius", "start_date": "Nov 22 - Dec 21" },
            { "id": "capricorn", "name": "Capricorn", "start_date": "Dec 22 - Jan 19" },
            { "id": "aquarius", "name": "Aquarius", "start_date": "Jan 20 - Feb 18" },
            { "id": "pisces", "name": "Pisces", "start_date": "Feb 19 - Mar 20" }
        ]
    };

    // Default predictions
    const defaultPredictions = {
        "today": {
            "aries": { overall: "Energetic day ahead!", love: "Romantic sparks fly", career: "New opportunity knocks", health: "Great energy levels", travel: "Short trip will be fruitful", finance: "Steady income expected", luck: 85, color: "Red", number: "7" },
            "taurus": { overall: "Stable and calm energy", love: "Deep connection forms", career: "Steady progress at work", health: "Good vitality", travel: "Avoid long trips today", finance: "Save money wisely", luck: 70, color: "Green", number: "4" },
            "gemini": { overall: "Curious and alert mind", love: "Flirty and fun vibes", career: "Important meetings", health: "Rest is needed", travel: "Exciting travel plans", finance: "Unexpected gain possible", luck: 90, color: "Yellow", number: "3" },
            "cancer": { overall: "Emotional and nurturing", love: "Quality family time", career: "Supportive colleagues", health: "Stay hydrated", travel: "Visit water bodies", finance: "Budget carefully", luck: 65, color: "White", number: "2" },
            "leo": { overall: "Shine bright like a star", love: "Passionate encounters", career: "Leadership role", health: "Regular exercise", travel: "Luxury trip awaits", finance: "Good investment time", luck: 95, color: "Gold", number: "1" },
            "virgo": { overall: "Productive and organized", love: "Practical approach", career: "Attention to detail", health: "Healthy eating habits", travel: "Plan your trip", finance: "Analyze expenses", luck: 75, color: "Brown", number: "5" },
            "libra": { overall: "Balanced and harmonious", love: "Romantic date night", career: "Teamwork succeeds", health: "Yoga helps", travel: "Travel with partner", finance: "Fair financial deals", luck: 80, color: "Pink", number: "6" },
            "scorpio": { overall: "Intense and powerful", love: "Deep trust builds", career: "Transformation coming", health: "Detox your body", travel: "Mysterious destination", finance: "Hidden money found", luck: 88, color: "Black", number: "8" },
            "sagittarius": { overall: "Adventure calls", love: "Freedom and fun", career: "Expansion phase", health: "Outdoor activities", travel: "Perfect time to travel", finance: "Spend on experiences", luck: 92, color: "Purple", number: "9" },
            "capricorn": { overall: "Focused and determined", love: "Commitment grows", career: "Promotion likely", health: "Stay disciplined", travel: "Business trip", finance: "Wealth increases", luck: 78, color: "Grey", number: "10" },
            "aquarius": { overall: "Innovative ideas flow", love: "Unique connection", career: "Creative projects", health: "Social energy high", travel: "Group trip planned", finance: "Tech investments pay", luck: 82, color: "Blue", number: "11" },
            "pisces": { overall: "Dreamy and intuitive", love: "Romantic fantasy", career: "Artistic success", health: "Rest and recharge", travel: "Beach escape", finance: "Trust your gut", luck: 87, color: "Sea Green", number: "12" }
        },
        "tomorrow": {}, "weekly": {}, "monthly": {}
    };

    // Load or initialize data
    let userPredictions = JSON.parse(localStorage.getItem("shivanetra_predictions"));
    if (!userPredictions) {
        userPredictions = JSON.parse(JSON.stringify(defaultPredictions));
    }

    let currentTab = "today";
    let currentSignId = "";
    let currentUser = { name: "", birthday: "", location: "" };

    // Helper functions
    function showMessage(msg) {
        const msgDiv = document.getElementById("message");
        msgDiv.textContent = msg;
        msgDiv.classList.add("show");
        setTimeout(() => msgDiv.classList.remove("show"), 3000);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }

    // Load signs dropdown
    function loadSigns() {
        const select = document.getElementById("signSelect");
        select.innerHTML = '<option value="">-- Select Your Zodiac Sign --</option>';
        signsData.zodiac_signs.forEach(sign => {
            const option = document.createElement("option");
            option.value = sign.id;
            option.textContent = `${sign.name} (${sign.start_date})`;
            select.appendChild(option);
        });
    }

    // Render predictions
    function render() {
        if (!currentSignId) {
            document.getElementById("signTitle").innerText = "Select a sign above";
            document.getElementById("categoryContainer").innerHTML = "";
            return;
        }

        const sign = signsData.zodiac_signs.find(s => s.id === currentSignId);
        document.getElementById("signTitle").innerHTML = `${sign.name} Horoscope - ${currentTab.toUpperCase()}`;

        if (!userPredictions[currentTab]) userPredictions[currentTab] = {};
        if (!userPredictions[currentTab][currentSignId]) {
            userPredictions[currentTab][currentSignId] = { overall: "", love: "", career: "", health: "", travel: "", finance: "", luck: 50, color: "", number: "" };
        }

        let pred = userPredictions[currentTab][currentSignId];
        const categories = [
            { key: "overall", label: "🌟 Overall", icon: "🔮" },
            { key: "love", label: "❤️ Love", icon: "💕" },
            { key: "career", label: "💼 Career", icon: "📈" },
            { key: "health", label: "🏃 Health", icon: "💪" },
            { key: "travel", label: "✈️ Travel", icon: "🌍" },
            { key: "finance", label: "💰 Finance", icon: "💵" },
            { key: "color", label: "🎨 Lucky Color", icon: "🌈" },
            { key: "number", label: "🔢 Lucky Number", icon: "🔢" }
        ];

        let html = `<div class="category-grid">`;
        categories.forEach(cat => {
            let value = pred[cat.key] || "";
            if (cat.key === "luck") value = pred.luck || 50;
            if (cat.key === "color" || cat.key === "number") {
                html += `<div class="category"><h3>${cat.icon} ${cat.label}</h3>
                        <input type="text" data-field="${cat.key}" value="${escapeHtml(value)}"></div>`;
            } else if (cat.key === "luck") {
                html += `<div class="category"><h3>${cat.icon} ${cat.label} (0-100)</h3>
                        <input type="range" data-field="${cat.key}" min="0" max="100" value="${value}">
                        <span id="luckValue">${value}%</span></div>`;
            } else {
                html += `<div class="category"><h3>${cat.icon} ${cat.label}</h3>
                        <textarea data-field="${cat.key}" rows="3">${escapeHtml(value)}</textarea></div>`;
            }
        });
        html += `</div><div class="chart-row"><span>🍀 Luck Meter</span><div class="meter"><div class="meter-fill" style="width:${pred.luck || 50}%"></div></div><span>${pred.luck || 50}%</span></div>`;
        document.getElementById("categoryContainer").innerHTML = html;

        document.querySelectorAll("[data-field]").forEach(input => {
            input.addEventListener("change", function() {
                const field = this.getAttribute("data-field");
                let newVal = this.value;
                if (field === "luck") newVal = parseInt(this.value);
                userPredictions[currentTab][currentSignId][field] = newVal;
                if (field === "luck") {
                    const luckSpan = document.getElementById("luckValue");
                    if (luckSpan) luckSpan.innerText = newVal + "%";
                    const fill = document.querySelector(".meter-fill");
                    if (fill) fill.style.width = newVal + "%";
                }
            });
            if (input.type === "range") {
                input.addEventListener("input", function() {
                    const span = document.getElementById("luckValue");
                    if (span) span.innerText = this.value + "%";
                });
            }
        });
    }

    // Get formatted prediction text for sharing
    function getFormattedPrediction() {
        if (!currentSignId) return "No sign selected";
        const sign = signsData.zodiac_signs.find(s => s.id === currentSignId);
        const pred = userPredictions[currentTab]?.[currentSignId] || {};
        return `🔮 SHIVANETRA HOROSCOPE 🔮
━━━━━━━━━━━━━━━━━━━━━
👤 Name: ${currentUser.name || "Guest"}
📍 Location: ${currentUser.location || "Unknown"}
📅 Date: ${new Date().toLocaleDateString()}
⭐ Sign: ${sign?.name || "Unknown"} (${currentTab.toUpperCase()})
━━━━━━━━━━━━━━━━━━━━━
🌟 Overall: ${pred.overall || "Not set"}
❤️ Love: ${pred.love || "Not set"}
💼 Career: ${pred.career || "Not set"}
🏃 Health: ${pred.health || "Not set"}
✈️ Travel: ${pred.travel || "Not set"}
💰 Finance: ${pred.finance || "Not set"}
🍀 Luck: ${pred.luck || 50}%
🎨 Lucky Color: ${pred.color || "Not set"}
🔢 Lucky Number: ${pred.number || "Not set"}
━━━━━━━━━━━━━━━━━━━━━
✨ Shivanetra - Your Cosmic Guide ✨`;
    }

    // Event Listeners
    document.getElementById("enterBtn").addEventListener("click", () => {
        currentUser = {
            name: document.getElementById("userName").value || "Guest",
            birthday: document.getElementById("userBirthday").value || "Not set",
            location: document.getElementById("userLocation").value || "Unknown"
        };
        document.getElementById("landingPage").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("userInfoBar").innerHTML = `👤 ${currentUser.name} | 📍 ${currentUser.location} | 🎂 ${currentUser.birthday}`;
        showMessage(`Welcome ${currentUser.name}! ✨`);
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
        localStorage.setItem("shivanetra_predictions", JSON.stringify(userPredictions));
        showMessage("✅ Predictions saved!");
    });

    document.getElementById("downloadBtn").addEventListener("click", () => {
        const dataStr = JSON.stringify(userPredictions, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `shivanetra_predictions_${currentUser.name}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showMessage("📥 JSON downloaded!");
    });

    document.getElementById("downloadHtmlBtn").addEventListener("click", () => {
        const htmlContent = `<!DOCTYPE html>
<html>
<head><title>Shivanetra - ${currentUser.name}'s Horoscope</title>
<style>body{font-family:Arial;background:#1a1a2e;color:#fff;padding:20px}</style>
</head>
<body>
<h1>✨ Shivanetra Horoscope ✨</h1>
<p>User: ${currentUser.name}</p>
<p>Location: ${currentUser.location}</p>
<p>Birthday: ${currentUser.birthday}</p>
<p>Date: ${new Date().toLocaleString()}</p>
<pre>${getFormattedPrediction()}</pre>
<footer>Generated by Shivanetra Pro</footer>
</body>
</html>`;
        const blob = new Blob([htmlContent], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `shivanetra_${currentUser.name}_horoscope.html`;
        a.click();
        URL.revokeObjectURL(url);
        showMessage("📄 HTML downloaded!");
    });

    document.getElementById("shareWhatsAppBtn").addEventListener("click", () => {
        const msg = getFormattedPrediction();
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    });

    document.getElementById("emailBtn").addEventListener("click", () => {
        const subject = `Shivanetra Horoscope for ${currentUser.name} - ${currentTab}`;
        const body = getFormattedPrediction();
        window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    });

    document.getElementById("signSelect").addEventListener("change", (e) => {
        currentSignId = e.target.value;
        render();
    });

    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentTab = btn.getAttribute("data-tab");
            render();
        });
    });

    loadSigns();
</script>
</body>
</html>
